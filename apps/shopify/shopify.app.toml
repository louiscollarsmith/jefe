# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "c7d72018569103d47cc8dffb3980e89a"
name = "jefe"
application_url = "https://shopify.dev/apps/default-app-home"
embedded = true

[build]
automatically_update_urls_on_dev = true
include_config_on_deploy = true

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

[access_scopes]
# Dummy store loader needs these in development to create Ticket 03 fixture
# products/variants, inventory levels, test orders/refunds, and the primary
# inventory location. Do not use this scope set for a production merchant app
# without a separate written scope review.
scopes = "read_locations,read_products,write_products,read_inventory,write_inventory,read_orders,write_orders"

[auth]
redirect_urls = [ "https://shopify.dev/apps/default-app-home/api/auth" ]
